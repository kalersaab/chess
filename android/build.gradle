buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

// Workaround for AGP lint crash: "Cannot find a KaModule for the VirtualFile"
// Affects any subproject using build.gradle.kts (e.g. reanimated, worklets).
// Android Lint cannot process .kts build scripts via the Kotlin Analysis API.
subprojects { subproject ->
    def buildFileName = subproject.buildFile.name
    if (buildFileName.endsWith(".kts")) {
        subproject.tasks.configureEach { task ->
            if (task.name.startsWith("lint")) {
                task.enabled = false
            }
        }
    }
}
